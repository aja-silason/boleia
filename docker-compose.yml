services:
  db:
    image: postgres:15
    container_name: boleia_db
    restart: unless-stopped
    env_file:
      - .env

    ports:
      - "5412:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boleia"]
      interval: 5s
      timeout: 5s
      retries: 10

  boleiastorage:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - boleia-minio-data:/data
    networks:
      default:
        aliases:
          - my-localhost
    restart: always

volumes:
  boleia-minio-data:
  postgres_data:
